# Build the documentation site and publish it to GitHub Pages.
#
# GitHub Actions builds ./docs/dist, writes the custom-domain CNAME, uploads the
# artifact, and deploys it to the repository's Pages environment.
name: Deploy docs

# Re-deploy when the docs site, the documented package, or this workflow changes
# on main; manual dispatch stays available for ad-hoc deploys.
#
# `pyssg/**` is included because the site's References section is generated from
# the `pyssg` package's docstrings (via the apidoc plugin reading ../pyssg), so a
# docstring-only edit outside docs/ must still rebuild and redeploy the site.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "pyssg/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newer pushes supersede in-flight runs.
concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - uses: actions/configure-pages@v5
      - run: uv sync --all-extras
      - name: Build site
        run: uv run cogito-publish build
        working-directory: docs
      - name: Write Pages custom domain
        run: printf 'publish.cogito-ai.org\n' > dist/CNAME
        working-directory: docs
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/dist
      - id: deployment
        uses: actions/deploy-pages@v4

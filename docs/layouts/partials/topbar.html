<header class="topbar">
  <a class="brand" href="/{{ page.locale | default('en') }}/">
    <svg class="brand-mark" width="28" height="28" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="pyssg-brand" x1="4" y1="2" x2="44" y2="46" gradientUnits="userSpaceOnUse">
          <stop stop-color="#6366F1"/><stop offset="0.55" stop-color="#6D45D8"/><stop offset="1" stop-color="#8B3DE0"/>
        </linearGradient>
      </defs>
      <rect width="48" height="48" rx="12" fill="url(#pyssg-brand)"/>
      <g stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M17.5 13.5 V38.5"/>
        <circle cx="24.8" cy="21" r="7.3"/>
        <path d="M32.1 21 L37 31.5" stroke-width="1.9" opacity="0.85"/>
      </g>
      <g fill="#fff">
        <circle cx="17.5" cy="13.5" r="3.3"/><circle cx="32.1" cy="21" r="3.3"/>
        <circle cx="17.5" cy="38.5" r="3.1"/><circle cx="37" cy="31.5" r="3.1"/>
      </g>
    </svg>
    <span>{{ site.title }}</span>
  </a>
  <span class="tagline">{{ site.tagline }}</span>
  <nav class="topbar-links">
    <a class="topbar-link" href="/{{ page.locale | default('en') }}/guide/getting-started/">Guide</a>
    <a class="topbar-link" href="{{ site.repo_url }}">GitHub</a>
    {% if page.translations and page.translations | length > 1 %}
      <span class="lang-switcher" role="group" aria-label="Language">
        <svg class="lang-globe" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/><path d="M3 12h18"/>
          <path d="M12 3c2.5 2.5 2.5 15 0 18M12 3c-2.5 2.5-2.5 15 0 18"/>
        </svg>
        {% for t in page.translations %}
          {% if t.current %}<span class="lang active" aria-current="true">{{ t.locale | upper }}</span>
          {% else %}<a class="lang" href="{{ t.url }}" hreflang="{{ t.locale }}">{{ t.locale | upper }}</a>{% endif %}
        {% endfor %}
      </span>
    {% endif %}
  </nav>
</header>
